# =============================================================================
# EDITORS
# =============================================================================

# Markdown
ext md = vim -- "$@"

# Programming languages
ext py|rs|go|rb|lua|r = vim -- "$@"
ext js|ts|jsx|tsx = vim -- "$@"
ext c|h|cpp|hpp|cc = vim -- "$@"
ext java|kt|scala = vim -- "$@"
ext sh|bash|zsh|fish = vim -- "$@"
ext sql = vim -- "$@"
ext tex = vim -- "$@"

# Config / data formats
ext toml|yaml|yml|json|jsonc = vim -- "$@"
ext ini|cfg|conf|env = vim -- "$@"
ext xml|html|css|scss = vim -- "$@"
ext Makefile|Dockerfile|containerfile = vim -- "$@"

# Plain text
ext txt|log|csv|tsv = vim -- "$@"
mime text/.* = vim -- "$@"


# =============================================================================
# DOCUMENTS
# =============================================================================

ext docx?|xlsx?|pptx?|odt|ods|odp, has open = open -- "$@"
ext pdf, has open                             = open -- "$@"


# =============================================================================
# MEDIA
# =============================================================================

mime image/.*, has open = open -- "$@"
mime audio/.*, has open = open -- "$@"
mime video/.*, has open = open -- "$@"


# =============================================================================
# ARCHIVES
# =============================================================================

ext tar|gz|bz2|xz|zst|zip|7z|rar = tar xf -- "$@"


# =============================================================================
# FALLBACK
# =============================================================================

mime application/x-executable = "$@"
